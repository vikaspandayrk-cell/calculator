<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator-card">
        <div class="display">
            <div id="upper-display"></div>
            <div id="main-display">0</div>
        </div>
        
        <div class="buttons-grid">

            <button class="btn-alt" onclick="clearAll()">AC</button>
            <button class="btn-alt" onclick="deleteLast()">DEL</button>
            <button class="btn-alt" onclick="insert('**')">x^y</button>
            <button class="btn-op" onclick="insert('/')">÷</button>
            
            <button onclick="insert('7')">7</button>
            <button onclick="insert('8')">8</button>
            <button onclick="insert('9')">9</button>
            <button class="btn-op" onclick="insert('*')">×</button>
            
            <button onclick="insert('4')">4</button>
            <button onclick="insert('5')">5</button>
            <button onclick="insert('6')">6</button>
            <button class="btn-op" onclick="insert('-')">−</button>
            
            <button onclick="insert('1')">1</button>
            <button onclick="insert('2')">2</button>
            <button onclick="insert('3')">3</button>
            <button class="btn-op" onclick="insert('+')">+</button>
            
            <button onclick="insert('0')">0</button>
            <button onclick="insert('.')">.</button>
            <button onclick="calcSqrt()">√</button>

            <button class="btn-equal" onclick="calculate()">=</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
